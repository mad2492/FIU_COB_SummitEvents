<template>
    <div class="wizard-page">
        <section class="page-header panel">
            <div class="page-header__main">
                <div class="breadcrumbs">
                    <button class="breadcrumb-link" onclick={returnToBrowser}>Events</button>
                    <span class="breadcrumb-separator" aria-hidden="true">&gt;</span>
                    <span class="breadcrumb-current">{title}</span>
                </div>
                <h1>{title}</h1>
                <p class="page-subtitle">Build the parent Event first, then decide whether to add the first dated Instance right away.</p>
            </div>
            <div class="page-header__actions">
                <lightning-button label="Cancel" onclick={returnToBrowser}></lightning-button>
            </div>
        </section>

        <template if:true={isLoading}>
            <section class="panel loading-panel">
                <lightning-spinner alternative-text="Loading wizard" size="small"></lightning-spinner>
            </section>
        </template>

        <template if:false={isLoading}>
            <template if:false={isSuccess}>
                <div class={wizardLayoutClass}>
                    <aside class="panel wizard-rail">
                        <div class="wizard-rail__header">
                            <p class="wizard-rail__eyebrow">Create Event</p>
                            <h2>Steps</h2>
                        </div>

                        <template for:each={step1TabStatuses} for:item="tab">
                            <button
                                key={tab.value}
                                class={tab.itemClass}
                                data-tab={tab.value}
                                onclick={handleStatusTabClick}
                                aria-current={tab.ariaCurrent}>
                                <span class={tab.circleClass}>
                                    <template if:true={tab.isCompleted}>
                                        <lightning-icon icon-name="utility:check" size="xx-small" alternative-text="Completed"></lightning-icon>
                                    </template>
                                    <template if:true={tab.isFailed}>!</template>
                                    <template if:false={tab.isCompleted}>
                                        <template if:false={tab.isFailed}>{tab.index}</template>
                                    </template>
                                </span>
                                <span class="wizard-step__copy">
                                    <span class="wizard-step__label">{tab.label}</span>
                                    <span class="wizard-step__desc">{tab.description}</span>
                                </span>
                            </button>
                        </template>

                        <div class="wizard-rail__footer">
                            <template if:true={isStep2}>
                                <div class="rail-status">First Instance Setup</div>
                            </template>
                            <template if:false={isStep2}>
                                <div class="rail-status">{currentStepMeta.stateText}</div>
                            </template>
                        </div>
                    </aside>

                    <section class="panel wizard-main">
                        <div class="wizard-main__header" data-step-anchor>
                            <div class="wizard-main__heading">
                                <p class="wizard-kicker">
                                    <template if:true={isStep1}>Step {currentStepMeta.index} of 6</template>
                                    <template if:true={isStep2}>Next: First Instance</template>
                                </p>
                                <h2 tabindex="-1" data-step-heading>
                                    <template if:true={isStep1}>{currentStepMeta.label}</template>
                                    <template if:true={isStep2}>First Instance Setup</template>
                                </h2>
                                <p class="wizard-main__subtitle">
                                    <template if:true={isStep1}>{currentStepMeta.description}</template>
                                    <template if:true={isStep2}>This is the first live occurrence people will actually register for.</template>
                                </p>
                            </div>

                            <div
                                class="progress-meter"
                                role="progressbar"
                                aria-label="Event setup progress"
                                aria-valuemin="0"
                                aria-valuemax="100"
                                aria-valuenow={currentStepMeta.progressValue}>
                                <div class="progress-meter__track"></div>
                                <div class="progress-meter__fill" style={currentStepMeta.progressStyle}></div>
                            </div>
                        </div>

                        <div class="wizard-main__body">
                            <template if:true={error}>
                                <div class="slds-notify slds-notify_alert slds-alert_error callout callout--error" role="alert">
                                    <lightning-icon icon-name="utility:error" size="x-small" alternative-text="Error"></lightning-icon>
                                    <span>{error}</span>
                                </div>
                            </template>

                            <template if:true={isStep1}>
                                <template if:true={isBasicsTab}>
                                    <section class="form-section">
                                        <div class="section-heading">
                                            <div>
                                                <h3>Basics</h3>
                                                <p class="section-copy">Define the parent Event record. These choices determine what downstream setup and public behavior will look like.</p>
                                            </div>
                                            <div class="section-chip">Parent Event</div>
                                        </div>

                                        <lightning-input
                                            data-field="eventName"
                                            label="Event Name"
                                            value={form.eventName}
                                            required
                                            message-when-value-missing="Enter a name for this event."
                                            onchange={handleInput}>
                                        </lightning-input>

                                        <div class="form-grid-two top-gap">
                                            <lightning-combobox
                                                data-field="recordTypeId"
                                                label="Record Type"
                                                value={form.recordTypeId}
                                                options={recordTypeOptions}
                                                required
                                                message-when-value-missing="Select a record type."
                                                onchange={handleInput}>
                                            </lightning-combobox>
                                            <lightning-combobox
                                                data-field="eventStatus"
                                                label="Event Status"
                                                value={form.eventStatus}
                                                options={statusOptions}
                                                required
                                                message-when-value-missing="Select an event status."
                                                onchange={handleInput}>
                                            </lightning-combobox>
                                        </div>

                                        <div class="form-grid-two top-gap">
                                            <lightning-input
                                                type="date"
                                                data-field="eventStartDate"
                                                label="Start Date"
                                                value={form.eventStartDate}
                                                required
                                                message-when-value-missing="Start Date is required."
                                                onchange={handleInput}>
                                            </lightning-input>
                                            <lightning-input
                                                type="date"
                                                data-field="eventEndDate"
                                                label="End Date"
                                                value={form.eventEndDate}
                                                required
                                                message-when-value-missing="End Date is required."
                                                onchange={handleInput}>
                                            </lightning-input>
                                        </div>

                                        <div class="form-grid-two top-gap">
                                            <lightning-combobox
                                                data-field="eventType"
                                                label="Event Type"
                                                value={form.eventType}
                                                options={eventTypeOptions}
                                                required
                                                message-when-value-missing="Select an event type."
                                                onchange={handleInput}>
                                            </lightning-combobox>
                                            <lightning-combobox
                                                data-field="category"
                                                label="Category"
                                                value={form.category}
                                                options={categoryOptions}
                                                required
                                                message-when-value-missing="Select a category."
                                                onchange={handleInput}>
                                            </lightning-combobox>
                                        </div>
                                    </section>
                                </template>

                                <template if:true={isProgramsTab}>
                                    <section class="form-section">
                                        <div class="section-heading">
                                            <div>
                                                <h3>Programs</h3>
                                                <p class="section-copy">{programsIntroCopy}</p>
                                            </div>
                                            <div class="section-chip">Routing</div>
                                        </div>

                                        <lightning-combobox
                                            data-field="businessUnitId"
                                            label="Business Unit"
                                            value={form.businessUnitId}
                                            options={businessUnitOptions}
                                            required
                                            message-when-value-missing="Select a Business Unit."
                                            onchange={handleBusinessUnitChange}>
                                        </lightning-combobox>

                                        <div class="settings-stack top-gap">
                                            <lightning-input
                                                type="checkbox"
                                                data-field="createOppsFromRegs"
                                                label="Create Opportunities from Registrations"
                                                checked={form.createOppsFromRegs}
                                                onchange={handleInput}>
                                            </lightning-input>
                                        </div>

                                        <div class="utility-card top-gap">
                                            <div class="utility-card__title">{programsWhyThisMattersTitle}</div>
                                            <p>{programsWhyThisMattersCopy}</p>
                                        </div>

                                        <lightning-dual-listbox
                                            class="top-gap"
                                            data-field="selectedPlanIds"
                                            name="selectedPlanIds"
                                            label="Programs"
                                            source-label="Available"
                                            selected-label="Selected"
                                            options={programOptions}
                                            value={selectedProgramValues}
                                            required={isProgramSelectionRequired}
                                            message-when-value-missing={programSelectionMessageWhenMissing}
                                            onchange={handleProgramSelectionChange}
                                            disable-reordering="true">
                                        </lightning-dual-listbox>
                                    </section>
                                </template>

                                <template if:true={isBrandingTab}>
                                    <section class="form-section">
                                        <div class="section-heading">
                                            <div>
                                                <h3>Branding</h3>
                                                <p class="section-copy">The template is the scaffold for the public registration experience. Images and copy layer on top, but the template remains the foundation.</p>
                                            </div>
                                            <div class="section-chip">Public Site</div>
                                        </div>

                                        <lightning-combobox
                                            data-field="templateId"
                                            label="Template"
                                            field-level-help="Primary RSVP template used for this event experience."
                                            value={form.templateId}
                                            options={templateOptions}
                                            required
                                            message-when-value-missing="Select an RSVP template."
                                            onchange={handleInput}>
                                        </lightning-combobox>

                                        <div class="form-grid-two top-gap">
                                            <div class="media-field">
                                                <lightning-input
                                                    data-field="templateBannerImage"
                                                    label="Template Banner Image"
                                                    field-level-help="Banner image URL shown in the RSVP template header."
                                                    value={form.templateBannerImage}
                                                    onchange={handleInput}>
                                                </lightning-input>
                                                <template if:true={showBannerPreview}>
                                                    <div class="image-preview top-gap-xs">
                                                        <img data-preview="banner" src={form.templateBannerImage} alt="Banner preview" onload={handlePreviewLoad} onerror={handlePreviewError} />
                                                    </div>
                                                </template>
                                                <template if:true={previewState.bannerError}>
                                                    <p class="field-error">Banner image URL could not be loaded. Please verify the link.</p>
                                                </template>
                                            </div>

                                            <div class="media-field">
                                                <lightning-input
                                                    data-field="templateLogoImage"
                                                    label="Template Logo Image"
                                                    field-level-help="Logo image URL used by the RSVP template."
                                                    value={form.templateLogoImage}
                                                    onchange={handleInput}>
                                                </lightning-input>
                                                <template if:true={showLogoPreview}>
                                                    <div class="image-preview top-gap-xs">
                                                        <img data-preview="logo" src={form.templateLogoImage} alt="Logo preview" onload={handlePreviewLoad} onerror={handlePreviewError} />
                                                    </div>
                                                </template>
                                                <template if:true={previewState.logoError}>
                                                    <p class="field-error">Logo image URL could not be loaded. Please verify the link.</p>
                                                </template>
                                            </div>
                                        </div>

                                        <div class="content-stack top-gap">
                                            <section class="content-section">
                                                <div class="content-section__header">
                                                    <h4>Event Page Description</h4>
                                                    <p>Main public-facing event description fields, grouped to match the Event record page.</p>
                                                </div>
                                                <div class="rich-field">
                                                    <div class="field-label">Event Description</div>
                                                    <p class="rich-field__help">Primary description shown on the public event page. Use this for the short overview users read first.</p>
                                                    <lightning-input-rich-text data-field="landingDescription" value={form.landingDescription} onchange={handleInput}></lightning-input-rich-text>
                                                </div>
                                                <div class="rich-field">
                                                    <div class="field-label">Event Full Text</div>
                                                    <p class="rich-field__help">Longer details such as agenda, audience notes, speaker context, or instructions before registration.</p>
                                                    <lightning-input-rich-text data-field="landingFullText" value={form.landingFullText} onchange={handleInput}></lightning-input-rich-text>
                                                </div>
                                                <div class="rich-field">
                                                    <div class="field-label">Event Short Listing Description</div>
                                                    <p class="rich-field__help">Compact description used in cards, feeds, or program landing pages. Keep this shorter than the main description.</p>
                                                    <lightning-input-rich-text data-field="landingShortListingDescription" value={form.landingShortListingDescription} onchange={handleInput}></lightning-input-rich-text>
                                                </div>
                                            </section>

                                            <section class="content-section">
                                                <div class="content-section__header">
                                                    <h4>Event Footer</h4>
                                                    <p>Footer or disclaimer text that appears with the registration experience.</p>
                                                </div>
                                                <div class="rich-field">
                                                    <div class="field-label">Event Footer / Disclaimer Text</div>
                                                    <p class="rich-field__help">Use for eligibility notes, policies, legal language, or closing text that should appear near the bottom of the RSVP page.</p>
                                                    <lightning-input-rich-text data-field="templateDisclaimerText" value={form.templateDisclaimerText} onchange={handleInput}></lightning-input-rich-text>
                                                </div>
                                            </section>

                                            <section class="content-section">
                                                <div class="content-section__header">
                                                    <h4>Buttons and Event Home Link</h4>
                                                    <p>Labels and links that help users move through or beyond the registration page.</p>
                                                </div>
                                                <lightning-input
                                                    data-field="registerButtonText"
                                                    label="Register Button Text"
                                                    field-level-help="Text shown on the RSVP register button."
                                                    value={form.registerButtonText}
                                                    onchange={handleInput}>
                                                </lightning-input>
                                                <div class="form-grid-two top-gap">
                                                    <lightning-input
                                                        data-field="feedRegistrationButtonText"
                                                        label="Feed Registration Button Text"
                                                        field-level-help="Button text used when this event appears in a public website feed."
                                                        value={form.feedRegistrationButtonText}
                                                        onchange={handleInput}>
                                                    </lightning-input>
                                                    <lightning-input
                                                        data-field="eventHomeLinkTitle"
                                                        label="Event Home Link Title"
                                                        field-level-help="Label for an optional link back to an event website or related page."
                                                        value={form.eventHomeLinkTitle}
                                                        onchange={handleInput}>
                                                    </lightning-input>
                                                </div>
                                                <lightning-input
                                                    class="top-gap"
                                                    data-field="eventHomeLinkUrl"
                                                    type="url"
                                                    label="Event Home Link URL"
                                                    field-level-help="Optional destination for the Event Home Link Title."
                                                    value={form.eventHomeLinkUrl}
                                                    onchange={handleInput}>
                                                </lightning-input>
                                            </section>

                                            <section class="content-section">
                                                <div class="content-section__header">
                                                    <h4>Registration Confirmation</h4>
                                                    <p>Confirmation content shown after someone successfully registers.</p>
                                                </div>
                                                <lightning-input data-field="confirmationTitle" label="Confirmation Title" field-level-help="Heading shown on the confirmation page after registration." value={form.confirmationTitle} onchange={handleInput}></lightning-input>
                                                <div class="rich-field">
                                                    <div class="field-label top-gap-xs">Confirmation Description</div>
                                                    <p class="rich-field__help">Follow-up instructions, next steps, or reassurance shown below the confirmation title.</p>
                                                    <lightning-input-rich-text data-field="confirmationDescription" value={form.confirmationDescription} onchange={handleInput}></lightning-input-rich-text>
                                                </div>
                                            </section>

                                            <section class="content-section">
                                                <div class="content-section__header">
                                                    <h4>Custom Questions Page</h4>
                                                    <p>Optional copy that introduces extra questions in the RSVP flow.</p>
                                                </div>
                                                <lightning-input data-field="customQuestionsTitle" label="Custom Questions Page Title" field-level-help="Heading shown above custom RSVP questions." value={form.customQuestionsTitle} onchange={handleInput}></lightning-input>
                                                <div class="rich-field">
                                                    <div class="field-label top-gap-xs">Custom Questions Description</div>
                                                    <p class="rich-field__help">Explain why the questions are being asked or what details registrants should provide.</p>
                                                    <lightning-input-rich-text data-field="customQuestionsDescription" value={form.customQuestionsDescription} onchange={handleInput}></lightning-input-rich-text>
                                                </div>
                                            </section>
                                        </div>

                                    </section>
                                </template>

                                <template if:true={isLogisticsTab}>
                                    <section class="form-section">
                                        <div class="section-heading">
                                            <div>
                                                <h3>Logistics</h3>
                                                <p class="section-copy">Location, capacity, and operational toggles shape what the live Instance can do and how the public experience behaves.</p>
                                            </div>
                                            <div class="section-chip">Operations</div>
                                        </div>

                                        <lightning-combobox
                                            data-field="locationType"
                                            label="Location Type"
                                            value={form.locationType}
                                            options={locationTypeOptions}
                                            required
                                            message-when-value-missing="Select an overall location type for this event."
                                            onchange={handleInput}>
                                        </lightning-combobox>

                                        <template if:true={requiresPhysicalLocationFields}>
                                            <div class="form-grid-two top-gap">
                                                <lightning-input
                                                    data-field="locationTitle"
                                                    label="Location Title"
                                                    value={form.locationTitle}
                                                    required
                                                    message-when-value-missing="Location Title is required for this location type."
                                                    onchange={handleInput}>
                                                </lightning-input>
                                                <lightning-input
                                                    data-field="locationAddress"
                                                    label="Location Address"
                                                    value={form.locationAddress}
                                                    required
                                                    message-when-value-missing="Location Address is required for this location type."
                                                    onchange={handleInput}>
                                                </lightning-input>
                                                <lightning-input
                                                    data-field="locationMapLink"
                                                    label="Location Map Link"
                                                    value={form.locationMapLink}
                                                    required
                                                    message-when-value-missing="Location Map Link is required for this location type."
                                                    onchange={handleInput}>
                                                </lightning-input>
                                                <lightning-input
                                                    data-field="building"
                                                    label="Building"
                                                    value={form.building}
                                                    required
                                                    message-when-value-missing="Building is required for this location type."
                                                    onchange={handleInput}>
                                                </lightning-input>
                                            </div>
                                        </template>

                                        <lightning-input
                                            class="top-gap"
                                            type="number"
                                            min="0"
                                            step="1"
                                            data-field="capacity"
                                            label="Capacity"
                                            value={form.capacity}
                                            field-level-help="Maximum number of attendees this event can support."
                                            onchange={handleInput}>
                                        </lightning-input>

                                        <div class="visibility-card top-gap">
                                            <lightning-input
                                                type="checkbox"
                                                data-field="privateEvent"
                                                label="Private Event"
                                                checked={form.privateEvent}
                                                onchange={handleInput}>
                                            </lightning-input>
                                            <p class="visibility-card__copy">Turn this on when the Event should be fully hidden from public website listings. Private Events can still be reached directly by URL, but they should not appear anywhere on the public site.</p>
                                        </div>

                                        <div class="form-grid-two top-gap">
                                            <lightning-combobox
                                                data-field="registrationEmailRestriction"
                                                label="Registration Email Restriction"
                                                value={form.registrationEmailRestriction}
                                                options={registrationEmailRestrictionOptions}
                                                onchange={handleInput}>
                                            </lightning-combobox>
                                        <template if:true={showWebsitePublishingChoice}>
                                            <lightning-combobox
                                                data-field="websitePublishingChoice"
                                                label="Show this event on program landing pages on business.fiu.edu?"
                                                value={form.websitePublishingChoice}
                                                options={websitePublishingOptions}
                                                onchange={handleInput}>
                                            </lightning-combobox>
                                            <p class="field-help-note">
                                                This only controls whether the Event is tagged for program landing-page sections.
                                                It does not remove the Event from public website listings. Use <strong>Private Event</strong> to hide it from the public site.
                                            </p>
                                        </template>
                                    </div>

                                        <div class="settings-stack top-gap">
                                            <lightning-input
                                                type="checkbox"
                                                data-field="sendRegistrationConfirmation"
                                                label="Send Registration Confirmation Email"
                                                checked={form.sendRegistrationConfirmation}
                                                onchange={handleInput}>
                                            </lightning-input>
                                        </div>
                                    </section>
                                </template>

                                <template if:true={isPaymentTab}>
                                    <section class="form-section">
                                        <div class="section-heading">
                                            <div>
                                                <h3>Payment</h3>
                                                <p class="section-copy">Only turn payment on when the registration flow should collect money. Paid events require complete gateway and accounting setup to work safely.</p>
                                            </div>
                                            <div class="section-chip">Paid Flow</div>
                                        </div>

                                        <lightning-input
                                            type="checkbox"
                                            data-field="isPaidRegistration"
                                            label="This is a Paid Registration event"
                                            checked={form.isPaidRegistration}
                                            onchange={handleInput}>
                                        </lightning-input>

                                        <template if:true={paidEvent}>
                                            <div class="slds-notify slds-notify_alert slds-alert_warning callout callout--warning top-gap" role="alert">
                                                <lightning-icon icon-name="utility:warning" size="x-small" alternative-text="Warning"></lightning-icon>
                                                <span>Paid events need both a Payment Gateway and an Accounting Department before the public experience is safe to use.</span>
                                            </div>

                                            <div class="form-grid-two top-gap">
                                                <lightning-combobox
                                                    data-field="paymentGateway"
                                                    label="Payment Gateway"
                                                    value={form.paymentGateway}
                                                    options={paymentGatewayOptions}
                                                    required
                                                    message-when-value-missing="Paid events require a Payment Gateway."
                                                    onchange={handleInput}>
                                                </lightning-combobox>
                                                <lightning-combobox
                                                    data-field="accountingDepartmentId"
                                                    label="Accounting Department"
                                                    value={form.accountingDepartmentId}
                                                    options={accountingDepartmentOptions}
                                                    required
                                                    message-when-value-missing="Paid events require an Accounting Department."
                                                    onchange={handleInput}>
                                                </lightning-combobox>
                                            </div>

                                            <lightning-input
                                                class="top-gap"
                                                type="number"
                                                step="0.01"
                                                data-field="eventFee"
                                                label="Event Fee"
                                                value={form.eventFee}
                                                required
                                                message-when-value-missing="Event Fee is required for paid events."
                                                onchange={handleInput}>
                                            </lightning-input>

                                            <div class="content-stack top-gap">
                                                <section class="content-section">
                                                    <div class="content-section__header">
                                                        <h4>Payment Messaging</h4>
                                                        <p>Messages shown around payment status and next steps in the registration flow.</p>
                                                    </div>
                                                    <div class="rich-field">
                                                        <div class="field-label">Payment Received Description</div>
                                                        <p class="rich-field__help">Message shown when payment has been received. Use this for receipt context or what happens next.</p>
                                                        <lightning-input-rich-text data-field="eventPaymentReceivedDescription" value={form.eventPaymentReceivedDescription} onchange={handleInput}></lightning-input-rich-text>
                                                    </div>
                                                    <div class="rich-field">
                                                        <div class="field-label">Payment Due Description</div>
                                                        <p class="rich-field__help">Message shown when payment is still due. Include clear payment expectations or follow-up instructions.</p>
                                                        <lightning-input-rich-text data-field="eventPaymentDueDescription" value={form.eventPaymentDueDescription} onchange={handleInput}></lightning-input-rich-text>
                                                    </div>
                                                </section>
                                            </div>

                                            <div class="form-grid-two top-gap">
                                                <lightning-input data-field="eventFeeLabel" label="Event Fee Label" value={form.eventFeeLabel} onchange={handleInput}></lightning-input>
                                                <lightning-input data-field="eventFeesReceivedLabel" label="Event Fees Received Label" value={form.eventFeesReceivedLabel} onchange={handleInput}></lightning-input>
                                                <lightning-input data-field="eventFeeSubmitListLabel" label="Event Fee Submit List Label" value={form.eventFeeSubmitListLabel} onchange={handleInput}></lightning-input>
                                                <lightning-input data-field="eventFeeTotalLabel" label="Event Fee Total Label" value={form.eventFeeTotalLabel} onchange={handleInput}></lightning-input>
                                                <lightning-input data-field="eventPaymentReceivedHeadingLabel" label="Payment Received Heading Label" value={form.eventPaymentReceivedHeadingLabel} onchange={handleInput}></lightning-input>
                                                <lightning-input data-field="eventPaymentDueHeadingLabel" label="Payment Due Heading Label" value={form.eventPaymentDueHeadingLabel} onchange={handleInput}></lightning-input>
                                            </div>
                                        </template>
                                    </section>
                                </template>

                                <template if:true={isReviewTab}>
                                    <section class="form-section">
                                        <div class="section-heading">
                                            <div>
                                                <h3>Review</h3>
                                                <p class="section-copy">Use this final pass to catch missing setup before saving the Event or moving into first-instance creation.</p>
                                            </div>
                                            <div class="section-chip">Final Check</div>
                                        </div>

                                        <template if:true={hasValidationErrors}>
                                            <div class="slds-notify slds-notify_alert slds-alert_error callout callout--error" role="alert">
                                                <lightning-icon icon-name="utility:error" size="x-small" alternative-text="Error"></lightning-icon>
                                                <div>
                                                    <strong>Fix these before creating:</strong>
                                                    <ul class="callout-list">
                                                        <template for:each={validationErrors} for:item="item">
                                                            <li key={item}>{item}</li>
                                                        </template>
                                                    </ul>
                                                </div>
                                            </div>
                                        </template>

                                        <template if:true={hasValidationWarnings}>
                                            <div class="slds-notify slds-notify_alert slds-alert_warning callout callout--warning top-gap" role="alert">
                                                <lightning-icon icon-name="utility:warning" size="x-small" alternative-text="Warning"></lightning-icon>
                                                <div>
                                                    <strong>Warnings to review:</strong>
                                                    <ul class="callout-list">
                                                        <template for:each={validationWarningsForRail} for:item="item">
                                                            <li key={item}>{item}</li>
                                                        </template>
                                                    </ul>
                                                </div>
                                            </div>
                                        </template>

                                        <div class="review-grid top-gap">
                                            <article class="review-card">
                                                <h4>Basics</h4>
                                                <template for:each={basicsSummaryItems} for:item="item">
                                                    <div key={item.label} class="review-row">
                                                        <span>{item.label}</span>
                                                        <strong>{item.value}</strong>
                                                    </div>
                                                </template>
                                            </article>
                                            <article class="review-card">
                                                <h4>Programs</h4>
                                                <template for:each={programSummaryItems} for:item="item">
                                                    <div key={item.label} class="review-row">
                                                        <span>{item.label}</span>
                                                        <strong>{item.value}</strong>
                                                    </div>
                                                </template>
                                            </article>
                                            <article class="review-card">
                                                <h4>Branding</h4>
                                                <template for:each={brandingSummaryItems} for:item="item">
                                                    <div key={item.label} class="review-row">
                                                        <span>{item.label}</span>
                                                        <strong>{item.value}</strong>
                                                    </div>
                                                </template>
                                            </article>
                                            <article class="review-card">
                                                <h4>Logistics</h4>
                                                <template for:each={logisticsSummaryItems} for:item="item">
                                                    <div key={item.label} class="review-row">
                                                        <span>{item.label}</span>
                                                        <strong>{item.value}</strong>
                                                    </div>
                                                </template>
                                            </article>
                                            <article class="review-card">
                                                <h4>Payment</h4>
                                                <template for:each={paymentSummaryItems} for:item="item">
                                                    <div key={item.label} class="review-row">
                                                        <span>{item.label}</span>
                                                        <strong>{item.value}</strong>
                                                    </div>
                                                </template>
                                            </article>
                                        </div>

                                        <template if:false={isPreviewDisabled}>
                                            <div class="step-actions top-gap">
                                                <lightning-button variant="neutral" label="Preview registration page" onclick={handlePreviewRsvp}></lightning-button>
                                            </div>
                                        </template>
                                    </section>
                                </template>

                                <div class="step-actions top-gap-lg">
                                    <template if:true={hasPrevTab}>
                                        <lightning-button label="Previous" icon-name="utility:back" onclick={handleStep1PrevTab}></lightning-button>
                                    </template>
                                    <template if:true={hasNextTab}>
                                        <lightning-button variant="brand" label="Next" icon-name="utility:forward" icon-position="right" onclick={handleStep1NextTab}></lightning-button>
                                    </template>
                                </div>

                                <template if:true={isReviewTab}>
                                    <div class="step-actions top-gap">
                                        <lightning-button variant="brand" label="Continue to Instance Setup" icon-name="utility:forward" icon-position="right" onclick={openInstanceStep} disabled={finalizeStep1Disabled}></lightning-button>
                                        <lightning-button variant="neutral" label="Save Event Without Instance" onclick={createEventOnly} disabled={finalizeStep1Disabled}></lightning-button>
                                    </div>
                                    <template if:false={canFinalizeStep1}>
                                        <p class="review-footnote">Complete the required setup fields before continuing or saving.</p>
                                    </template>
                                </template>
                            </template>

                            <template if:true={isStep2}>
                                <section class="form-section">
                                    <div class="section-heading">
                                        <div>
                                            <h3>Create the first Instance</h3>
                                            <p class="section-copy">This creates the first specific date and time people can actually register for under the Event you just configured.</p>
                                        </div>
                                        <div class="section-chip">Event &gt; Instance</div>
                                    </div>

                                    <lightning-input
                                        data-field="instanceTitle"
                                        label="Instance Title"
                                        value={form.instanceTitle}
                                        required
                                        message-when-value-missing="Give this instance a title."
                                        onchange={handleInput}>
                                    </lightning-input>

                                    <div class="form-grid-two top-gap">
                                        <lightning-input
                                            type="datetime"
                                            data-field="instanceStart"
                                            label="Start"
                                            value={form.instanceStart}
                                            required
                                            message-when-value-missing="Start date and time are required."
                                            onchange={handleInput}>
                                        </lightning-input>
                                        <lightning-input
                                            type="datetime"
                                            data-field="instanceEnd"
                                            label="End"
                                            value={form.instanceEnd}
                                            required
                                            message-when-value-missing="End date and time are required."
                                            onchange={handleInput}>
                                        </lightning-input>
                                    </div>

                                    <lightning-input
                                        class="top-gap"
                                        type="checkbox"
                                        data-field="instanceOpenRegistration"
                                        label="Open Registration"
                                        checked={form.instanceOpenRegistration}
                                        onchange={handleInput}>
                                    </lightning-input>

                                    <div class="step-actions top-gap-lg">
                                        <lightning-button label="Back to Event Review" icon-name="utility:back" onclick={prevStep}></lightning-button>
                                        <lightning-button variant="brand" label="Create Event + Instance" onclick={finishCreate} disabled={isSaving}></lightning-button>
                                    </div>
                                </section>
                            </template>
                        </div>
                    </section>

                    <aside class="panel wizard-side">
                        <div class="wizard-side__section">
                            <div class="wizard-side__heading">
                                <lightning-button variant="neutral" label="Preview registration page" onclick={handlePreviewRsvp} disabled={isPreviewDisabled}></lightning-button>
                            </div>
                            <div class="summary-card">
                                <div class="summary-card__strip">
                                    <span class="summary-card__strip-title">
                                        <lightning-icon icon-name="utility:event" size="xx-small" alternative-text="Event"></lightning-icon>
                                        <span>Event Builder Summary</span>
                                    </span>
                                    <span class="summary-card__strip-pct">{summaryProgressPct}% complete</span>
                                </div>
                                <div class="summary-progress-track">
                                    <div class={summaryProgressFillClass} style={summaryProgressStyle}></div>
                                </div>

                                <div class="summary-section">
                                    <div class="summary-name">
                                        <template if:true={hasSummaryEventName}>{summaryEventName}</template>
                                        <template if:false={hasSummaryEventName}><span class="summary-empty">Untitled event</span></template>
                                    </div>
                                    <template if:true={hasSummaryTags}>
                                        <div class="summary-tag-row">
                                            <template for:each={summaryTags} for:item="tag">
                                                <span key={tag.key} class="summary-tag">{tag.label}</span>
                                            </template>
                                        </div>
                                    </template>
                                </div>

                                <div class="summary-section">
                                    <div class="summary-facts">
                                        <template for:each={summaryFacts} for:item="fact">
                                            <div key={fact.key} class="summary-fact">
                                                <lightning-icon icon-name={fact.icon} size="xx-small" alternative-text={fact.label}></lightning-icon>
                                                <span class="summary-fact__label">{fact.label}</span>
                                                <span class="summary-fact__value">
                                                    <template if:true={fact.value}>{fact.value}</template>
                                                    <template if:false={fact.value}><span class="summary-empty">not set</span></template>
                                                </span>
                                            </div>
                                        </template>
                                    </div>
                                </div>

                                <template if:true={hasSummaryFlags}>
                                    <div class="summary-section">
                                        <div class="summary-eyebrow">What this event does</div>
                                        <div class="summary-flags">
                                            <template for:each={summaryFlags} for:item="flag">
                                                <div key={flag.key} class="summary-flag">
                                                    <lightning-icon icon-name="utility:check" size="xx-small" alternative-text="Enabled"></lightning-icon>
                                                    <span>{flag.label}</span>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>

                                <div class="summary-section">
                                    <div class="summary-eyebrow">Steps</div>
                                    <div class="summary-steps">
                                        <template for:each={summaryStepChecks} for:item="item">
                                            <button
                                                key={item.key}
                                                class={item.rowClass}
                                                type="button"
                                                data-tab={item.tab}
                                                onclick={handleSummaryStepJump}>
                                                <span class={item.dotClass}>
                                                    <template if:true={item.ok}>&#10003;</template>
                                                </span>
                                                <span class="summary-step__label">{item.label}</span>
                                                <span class="summary-step__count">{item.count}</span>
                                            </button>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <template if:false={isReviewTab}>
                            <template if:true={showValidationRailSection}>
                            <div class="wizard-side__section">
                                <h3>Validation</h3>
                                <div class="side-card">
                                    <template if:false={showDetailedValidationRail}>
                                        <div class="validation-group">
                                            <span class="validation-heading validation-heading--error">This Step</span>
                                            <ul class="validation-list">
                                                <template for:each={currentStepValidationErrors} for:item="item">
                                                    <li key={item}>{item}</li>
                                                </template>
                                            </ul>
                                        </div>
                                    </template>
                                    <template if:true={showDetailedValidationRail}>
                                        <template if:true={hasValidationErrors}>
                                            <div class="validation-group">
                                                <span class="validation-heading validation-heading--error">Errors</span>
                                                <ul class="validation-list">
                                                    <template for:each={validationErrors} for:item="item">
                                                        <li key={item}>{item}</li>
                                                    </template>
                                                </ul>
                                            </div>
                                        </template>
                                        <template if:false={hasValidationErrors}>
                                            <div class="validation-ok">Required fields for Event creation are currently satisfied.</div>
                                        </template>

                                        <template if:true={hasValidationWarnings}>
                                            <div class="validation-group top-gap">
                                                <span class="validation-heading validation-heading--warning">Warnings</span>
                                                <ul class="validation-list">
                                                    <template for:each={validationWarningsForRail} for:item="item">
                                                        <li key={item}>{item}</li>
                                                    </template>
                                                </ul>
                                            </div>
                                        </template>
                                    </template>
                                </div>
                            </div>
                            </template>

                            <div class="wizard-side__section">
                                <h3>Context Help</h3>
                                <div class="side-card">
                                    <strong>{currentHelpTitle}</strong>
                                    <p class="side-help-copy">{currentHelpBody}</p>
                                </div>
                            </div>
                        </template>
                    </aside>
                </div>
            </template>

            <template if:true={isSuccess}>
                <section class="panel success-panel">
                    <div class="success-banner">
                        <p class="wizard-kicker">Complete</p>
                        <h2>Event created successfully.</h2>
                        <template if:true={createdInstanceId}>
                            <p>First instance was created and remains inactive until you are ready to go live.</p>
                        </template>
                        <template if:false={createdInstanceId}>
                            <p>The Event is saved. Add an Instance next so people have something to register for.</p>
                        </template>
                    </div>

                    <template if:true={hasSuccessWarnings}>
                        <div class="slds-notify slds-notify_alert slds-alert_warning callout callout--warning top-gap" role="alert">
                            <lightning-icon icon-name="utility:warning" size="x-small" alternative-text="Warning"></lightning-icon>
                            <span>Review before go-live: {firstSuccessWarning}</span>
                        </div>
                    </template>

                    <div class="step-actions top-gap-lg">
                        <lightning-button variant="brand" label="Open Event" onclick={openEvent}></lightning-button>
                        <template if:true={createdInstanceId}>
                            <lightning-button label="Open Instance" onclick={openInstance}></lightning-button>
                        </template>
                        <lightning-button label="Add Another Instance" onclick={addAnotherInstance}></lightning-button>
                        <lightning-button label="Return to Browser" onclick={returnToBrowser}></lightning-button>
                    </div>
                </section>
            </template>
        </template>
    </div>
</template>
