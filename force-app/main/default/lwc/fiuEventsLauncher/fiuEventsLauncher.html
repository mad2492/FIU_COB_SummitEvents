<template>
    <div class="launcher-grid">
        <article class="launcher-card">
            <h3>Create New Event</h3>
            <p>Use this when this is a new parent event concept, not a repeat occurrence.</p>
            <lightning-button label="Start" variant="brand" data-mode="create" onclick={handleRoute}></lightning-button>
        </article>
        <article class="launcher-card">
            <h3>Clone Existing Event</h3>
            <p>Use this when you want to copy setup from a prior event, then review risky settings.</p>
            <lightning-button label="Start" variant="brand" data-mode="clone" onclick={handleRoute}></lightning-button>
        </article>
        <article class="launcher-card">
            <h3>Add New Instance to Existing Event</h3>
            <p>Use this when the parent event already exists and you only need another occurrence.</p>
            <lightning-button label="Start" variant="brand" data-mode="instance" onclick={handleRoute}></lightning-button>
        </article>
    </div>
    <template if:true={isCreate}><c-fiu-event-create-wizard></c-fiu-event-create-wizard></template>
    <template if:true={isClone}><c-fiu-event-clone-wizard></c-fiu-event-clone-wizard></template>
    <template if:true={isInstance}><c-fiu-instance-create-wizard></c-fiu-instance-create-wizard></template>
</template>
