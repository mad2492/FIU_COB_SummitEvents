<template>
    <c-fiu-list-shell
        page-title="Events"
        breadcrumb-label="Home"
        current-crumb="Events"
        icon-name="utility:event"
        icon-color="#5867e8"
        list-title="Events"
        total-count={totalCount}
        object-label="Event"
        hint-text="Events are the parent concept. Each Event has one or more Instances (specific dates/times) for people to register for."
        search-value={searchKey}
        columns={columns}
        rows={rows}
        visible-column-keys={visibleColumnKeys}
        selected-row-id={selectedEventId}
        selected-row-ids={selectedRowIds}
        sort-field={sortField1}
        sort-dir={sortDir1}
        is-loading={isLoading}
        page-number={pageNumber}
        page-size={pageSize}
        page-size-options={pageSizeOptions}
        active-filter-pills={activeFilterPills}
        empty-title="No events match these filters."
        empty-body="Try adjusting your search or filters, or clear all to start over."
        quick-view-title={quickViewTitle}
        quick-view-subhead={quickViewSubhead}
        onsearch={handleSearch}
        onsortchange={handleSortChange}
        onpagechange={handlePageChange}
        onpagesizechange={handlePageSizeChange}
        onrowclick={handleRowClick}
        onrowselect={handleRowSelect}
        onrowselectall={handleRowSelectAll}
        onremovepill={handleRemovePill}
        onclearfilters={handleClearFilters}
        onopenfilters={handleOpenFilters}
        onopensettings={handleOpenSettings}
        onresetview={handleResetView}
        onquickviewclose={handleQuickViewClose}
        onclearselection={handleClearSelection}
        oncellaction={handleCellAction}
        onbreadcrumbhome={handleBreadcrumbHome}>

        <!-- page header actions -->
        <div slot="header-actions" class="header-actions-group">
            <lightning-button-menu alternative-text="Export Options" label="Export" menu-alignment="right" onselect={handleExportMenuSelect}>
                <lightning-menu-item value="selected" label="Selected Rows"></lightning-menu-item>
                <lightning-menu-item value="filtered" label="Current Filtered View"></lightning-menu-item>
            </lightning-button-menu>
            <lightning-button label="Create New Event" variant="brand" icon-name="utility:add" onclick={handleCreateNew}></lightning-button>
        </div>

        <!-- inline filters: Status, Readiness -->
        <div slot="inline-filters" class="inline-filters">
            <lightning-combobox
                class="inline-filter inline-filter--status"
                variant="label-hidden"
                label="Status"
                placeholder="Status"
                value={statusFilter}
                options={statusOptions}
                onchange={handleInlineStatus}>
            </lightning-combobox>
            <lightning-combobox
                class="inline-filter inline-filter--readiness"
                variant="label-hidden"
                label="Readiness"
                placeholder="Readiness"
                value={readinessFilter}
                options={readinessOptions}
                onchange={handleInlineReadiness}>
            </lightning-combobox>
        </div>

        <!-- quick-view body content -->
        <div slot="quick-view-body" class="qv-body">
            <template if:true={selectedEvent}>
                <div class="qv-status-bar">
                    <dl class="qv-dl">
                        <dt>Status</dt>
                        <dd>
                            <c-fiu-datatable-pill-cell label={quickViewStatusLabel} theme={quickViewStatusTheme}></c-fiu-datatable-pill-cell>
                        </dd>
                        <dt>Readiness</dt>
                        <dd>
                            <c-fiu-datatable-pill-cell label={quickViewReadinessLabel} theme={quickViewReadinessTheme}></c-fiu-datatable-pill-cell>
                        </dd>
                    </dl>
                </div>

                <div class="qv-action-bar">
                    <lightning-button-group>
                        <lightning-button label="Open" variant="brand" onclick={openSelectedEventRecord}></lightning-button>
                        <lightning-button label="Add Instance" variant="neutral" onclick={addInstanceForSelectedEvent}></lightning-button>
                        <lightning-button-menu
                            alternative-text="More actions"
                            menu-alignment="right"
                            icon-size="x-small"
                            variant="border-filled"
                            onselect={handleQuickViewMoreSelect}>
                            <lightning-menu-item value="instances" label="View Instances"></lightning-menu-item>
                            <lightning-menu-item value="clone" label="Clone Event"></lightning-menu-item>
                        </lightning-button-menu>
                    </lightning-button-group>
                </div>

                <div class="qv-meta">
                    <div class="qv-meta-row">
                        <span class="qv-meta-label">Instances</span>
                        <span class="qv-meta-value">{selectedEvent.instanceCount}</span>
                    </div>
                    <div class="qv-meta-row">
                        <span class="qv-meta-label">Start date</span>
                        <span class="qv-meta-value">
                            <lightning-formatted-date-time value={selectedEvent.startDate}></lightning-formatted-date-time>
                        </span>
                    </div>
                </div>

                <template if:true={showQuickViewIssuePanel}>
                    <div class="qv-callout" role="status" aria-live="polite">
                        <lightning-icon icon-name="utility:warning" size="x-small" alternative-text="Issue"></lightning-icon>
                        <div class="qv-callout__text">
                            <p class="qv-callout__title">{quickViewIssueTitle}</p>
                            <p class="qv-callout__body">{quickViewIssueBody}</p>
                            <template if:true={quickViewIssueActionLabel}>
                                <div class="qv-callout__action">
                                    <lightning-button variant="base" label={quickViewIssueActionLabel} onclick={handleQuickViewIssueAction}></lightning-button>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </template>
        </div>
    </c-fiu-list-shell>

    <!-- Filter modal: Program only (Status & Readiness are inline) -->
    <template if:true={isFilterModalOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header"><h2 class="slds-text-heading_medium">Filters</h2></header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-combobox label="Program" value={draftProgramCode} options={programOptions} onchange={handleDraftProgram}></lightning-combobox>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeFilterModal}></lightning-button>
                    <lightning-button class="slds-m-left_small" variant="brand" label="Apply" onclick={applyFilters}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Field picker modal -->
    <template if:true={isFieldModalOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container field-modal-container">
                <header class="slds-modal__header"><h2 class="slds-text-heading_medium">Select Fields to Display</h2></header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-dual-listbox
                        class="field-picker"
                        name="eventFieldPicker"
                        label="Visible Fields"
                        source-label="Available Fields"
                        selected-label="Visible Fields"
                        options={fieldChooserOptions}
                        value={draftVisibleColumnKeys}
                        onchange={handleFieldSelection}>
                    </lightning-dual-listbox>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeFieldModal}></lightning-button>
                    <lightning-button class="slds-m-left_small" variant="brand" label="Apply" onclick={applyFieldSelection}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Create event wizard modal -->
    <template if:true={isCreateModalOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container wizard-modal-container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">Create New Event</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <c-fiu-event-create-wizard></c-fiu-event-create-wizard>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={closeCreateModal}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
