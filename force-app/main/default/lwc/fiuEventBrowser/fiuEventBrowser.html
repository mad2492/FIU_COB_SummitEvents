<template>
    <section class="page-header panel">
        <div class="page-header__main">
            <div class="breadcrumbs">
                <button class="breadcrumb-link" onclick={navigateHome}>Home</button>
                <span class="breadcrumb-separator" aria-hidden="true">&gt;</span>
                <span class="breadcrumb-current">Events</span>
            </div>
            <h1>Events</h1>
        </div>
        <div class="page-header__actions">
            <lightning-button-menu alternative-text="Export Options" label="Export" menu-alignment="right" onselect={handleExportMenuSelect}>
                <lightning-menu-item value="selected" label="Selected Rows"></lightning-menu-item>
                <lightning-menu-item value="filtered" label="Current Filtered View"></lightning-menu-item>
            </lightning-button-menu>
            <lightning-button label="Create New Event" variant="brand" icon-name="utility:add" onclick={handleCreateNew}></lightning-button>
        </div>
    </section>

    <div class={browserLayoutClass}>
        <section class="panel list-shell">
            <div class="list-shell__header">
                <div class="list-shell__title">
                    <span class="list-shell__icon">
                        <lightning-icon icon-name="utility:event" size="x-small" alternative-text="Events"></lightning-icon>
                    </span>
                    <div>
                        <h2>Events</h2>
                        <p>{totalCount} records</p>
                    </div>
                </div>
            </div>

            <div class="hint-banner">
                <lightning-icon icon-name="utility:info" size="xx-small" alternative-text="Info"></lightning-icon>
                <span>Events are the parent concept. Each Event has one or more Instances (specific dates/times) for people to register for.</span>
            </div>

            <div class="toolbar">
                <lightning-input class="search" type="search" variant="label-hidden" label="Search this list" placeholder="Search this list..." value={searchKey} onchange={handleSearch}></lightning-input>
                <div class="toolbar__actions">
                    <lightning-button-icon icon-name="utility:refresh" alternative-text="Refresh" title="Refresh" onclick={refreshView}></lightning-button-icon>
                    <lightning-button label="Filters" icon-name="utility:filterList" onclick={openFilterModal}></lightning-button>
                    <lightning-button-menu alternative-text="View Settings" icon-name="utility:settings" menu-alignment="right" onselect={handleGearSelect}>
                        <lightning-menu-item value="fields" label="Select Fields to Display"></lightning-menu-item>
                        <lightning-menu-item value="reset" label="Reset to Default View"></lightning-menu-item>
                    </lightning-button-menu>
                </div>
            </div>

            <template if:true={hasActiveFilters}>
                <div class="filter-pills">
                    <template for:each={activeFilterPills} for:item="pill">
                        <lightning-pill key={pill.key} label={pill.label} name={pill.key} onremove={handleRemovePill}></lightning-pill>
                    </template>
                    <lightning-button class="slds-m-left_x-small" variant="base" label="Clear all" onclick={resetToDefaultView}></lightning-button>
                </div>
            </template>

            <template if:true={isLoading}>
                <div class="loading-region">
                    <lightning-spinner alternative-text="Loading events" size="small"></lightning-spinner>
                </div>
            </template>

            <div class="table-shell">
                <template if:true={hasRows}>
                    <div class="table-scroll">
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered event-table">
                            <thead>
                                <tr class="slds-line-height_reset">
                                    <th class="checkbox-col" scope="col">
                                        <lightning-input
                                            type="checkbox"
                                            variant="label-hidden"
                                            label="Select all"
                                            checked={allRowsSelected}
                                            onchange={handleSelectAllRows}>
                                        </lightning-input>
                                    </th>
                                    <template if:true={showNameColumn}>
                                        <th scope="col">
                                            <button class="sort-button" data-field="name" onclick={handleSortClick}>
                                                <span class="slds-truncate">Event Name</span>
                                                <lightning-icon class="sort-icon" icon-name={nameSortIcon} size="xx-small" alternative-text=""></lightning-icon>
                                            </button>
                                        </th>
                                    </template>
                                    <template if:true={showRecordTypeColumn}>
                                        <th scope="col">
                                            <button class="sort-button" data-field="recordType" onclick={handleSortClick}>
                                                <span class="slds-truncate">Record Type</span>
                                                <lightning-icon class="sort-icon" icon-name={recordTypeSortIcon} size="xx-small" alternative-text=""></lightning-icon>
                                            </button>
                                        </th>
                                    </template>
                                    <template if:true={showStatusColumn}>
                                        <th scope="col">
                                            <button class="sort-button" data-field="status" onclick={handleSortClick}>
                                                <span class="slds-truncate">Status</span>
                                                <lightning-icon class="sort-icon" icon-name={statusSortIcon} size="xx-small" alternative-text=""></lightning-icon>
                                            </button>
                                        </th>
                                    </template>
                                    <template if:true={showReadinessColumn}>
                                        <th scope="col">
                                            <span class="header-label">Readiness</span>
                                        </th>
                                    </template>
                                    <template if:true={showIssuesColumn}>
                                        <th scope="col">
                                            <span class="header-label">Issues</span>
                                        </th>
                                    </template>
                                    <template if:true={showInstancesColumn}>
                                        <th scope="col" class="instances-col">
                                            <span class="header-label">Instances</span>
                                        </th>
                                    </template>
                                    <template if:true={showStartDateColumn}>
                                        <th scope="col">
                                            <button class="sort-button" data-field="startDate" onclick={handleSortClick}>
                                                <span class="slds-truncate">Start Date</span>
                                                <lightning-icon class="sort-icon" icon-name={startDateSortIcon} size="xx-small" alternative-text=""></lightning-icon>
                                            </button>
                                        </th>
                                    </template>
                                    <th class="quick-view-col" scope="col"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={rows} for:item="row">
                                    <tr key={row.id}>
                                        <td class="checkbox-col">
                                            <lightning-input
                                                type="checkbox"
                                                variant="label-hidden"
                                                label="Select row"
                                                checked={row.isSelected}
                                                data-id={row.id}
                                                onchange={handleRowSelection}>
                                            </lightning-input>
                                        </td>
                                        <template if:true={showNameColumn}>
                                            <td>
                                                <button class="name-button" data-id={row.id} onclick={openQuickViewFromButton}>{row.name}</button>
                                            </td>
                                        </template>
                                        <template if:true={showRecordTypeColumn}>
                                            <td>{row.recordType}</td>
                                        </template>
                                        <template if:true={showStatusColumn}>
                                            <td>
                                                <c-fiu-datatable-pill-cell label={row.status} theme={row.statusTheme}></c-fiu-datatable-pill-cell>
                                            </td>
                                        </template>
                                        <template if:true={showReadinessColumn}>
                                            <td>
                                                <c-fiu-datatable-pill-cell label={row.readiness} theme={row.readinessTheme}></c-fiu-datatable-pill-cell>
                                            </td>
                                        </template>
                                        <template if:true={showIssuesColumn}>
                                            <td class="issues-cell">{row.issueReason}</td>
                                        </template>
                                        <template if:true={showInstancesColumn}>
                                            <td class="instances-col">{row.instanceCount}</td>
                                        </template>
                                        <template if:true={showStartDateColumn}>
                                            <td>
                                                <lightning-formatted-date-time value={row.startDate}></lightning-formatted-date-time>
                                            </td>
                                        </template>
                                        <td class="quick-view-col">
                                            <button class="quick-view-button" data-id={row.id} onclick={openQuickViewFromButton} title="Quick view">
                                                <lightning-icon icon-name="utility:preview" size="xx-small" alternative-text="Quick view"></lightning-icon>
                                            </button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
                <template if:false={hasRows}>
                    <template if:false={isLoading}>
                        <div class="empty-state">
                            <p class="slds-text-heading_small">No events match these filters.</p>
                            <p class="slds-text-body_small slds-m-top_x-small">Try adjusting your search or filters, or clear all to start over.</p>
                            <lightning-button class="slds-m-top_small" variant="base" label="Clear filters" onclick={resetToDefaultView}></lightning-button>
                        </div>
                    </template>
                </template>
            </div>

            <div class="pager">
                <span>Page {pageNumber} of {totalPages} ({totalCount} records)</span>
                <div class="pager-actions">
                    <lightning-combobox class="rows-per-page slds-m-right_x-small" label="Rows per page" value={pageSizeValue} options={pageSizeOptions} onchange={handlePageSize}></lightning-combobox>
                    <lightning-button label="Previous" onclick={handlePrevPage} disabled={disablePrev}></lightning-button>
                    <lightning-button class="slds-m-left_x-small" label="Next" onclick={handleNextPage} disabled={disableNext}></lightning-button>
                </div>
            </div>
        </section>

        <template if:true={selectedEvent}>
            <aside class="panel quick-view">
                <div class="quick-view__header">
                    <h2>Quick view</h2>
                    <lightning-button-icon icon-name="utility:close" alternative-text="Close quick view" title="Close quick view" onclick={closeQuickView}></lightning-button-icon>
                </div>
                <div class="quick-view__body">
                    <h3>{selectedEvent.name}</h3>
                    <p class="quick-view__subhead">{selectedEvent.recordType}</p>

                    <div class="quick-view__stats">
                        <div>
                            <span class="stat-label">Status</span>
                            <span class={selectedEvent.statusClass}>{selectedEvent.status}</span>
                        </div>
                        <div>
                            <span class="stat-label">Readiness</span>
                            <span class={selectedEvent.readinessClass}>{selectedEvent.readiness}</span>
                        </div>
                        <div>
                            <span class="stat-label">Instances</span>
                            <span class="stat-value">{selectedEvent.instanceCount}</span>
                        </div>
                        <div>
                            <span class="stat-label">Start Date</span>
                            <lightning-formatted-date-time value={selectedEvent.startDate}></lightning-formatted-date-time>
                        </div>
                    </div>

                    <template if:true={selectedEvent.issueReason}>
                        <div class="issue-callout">
                            <lightning-icon icon-name="utility:warning" size="x-small" alternative-text="Issue"></lightning-icon>
                            <span>{selectedEvent.issueReason}</span>
                        </div>
                    </template>
                </div>
                <div class="quick-view__actions">
                    <lightning-button label="Open Event" onclick={openSelectedEventRecord}></lightning-button>
                    <lightning-button label="View Instances" onclick={openSelectedEventInstances}></lightning-button>
                    <lightning-button variant="brand" label="Add Instance" onclick={addInstanceForSelectedEvent}></lightning-button>
                </div>
            </aside>
        </template>
    </div>

    <template if:true={isFilterModalOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header"><h2 class="slds-text-heading_medium">Filters</h2></header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-combobox label="Status" value={draftStatusFilter} options={statusOptions} onchange={handleDraftStatus}></lightning-combobox>
                    <div class="slds-m-top_medium">
                        <lightning-combobox label="Readiness" value={draftReadinessFilter} options={readinessOptions} onchange={handleDraftReadiness}></lightning-combobox>
                    </div>
                    <div class="slds-m-top_medium">
                        <lightning-combobox label="Program" value={draftProgramCode} options={programOptions} onchange={handleDraftProgram}></lightning-combobox>
                    </div>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeFilterModal}></lightning-button>
                    <lightning-button class="slds-m-left_small" variant="brand" label="Apply" onclick={applyFilters}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <template if:true={isFieldModalOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container field-modal-container">
                <header class="slds-modal__header"><h2 class="slds-text-heading_medium">Select Fields to Display</h2></header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-dual-listbox
                        class="field-picker"
                        name="eventFieldPicker"
                        label="Visible Fields"
                        source-label="Available Fields"
                        selected-label="Visible Fields"
                        options={fieldChooserOptions}
                        value={draftVisibleColumnKeys}
                        onchange={handleFieldSelection}>
                    </lightning-dual-listbox>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeFieldModal}></lightning-button>
                    <lightning-button class="slds-m-left_small" variant="brand" label="Apply" onclick={applyFieldSelection}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <template if:true={isCreateModalOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container wizard-modal-container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">Create New Event</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <c-fiu-event-create-wizard></c-fiu-event-create-wizard>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={closeCreateModal}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
