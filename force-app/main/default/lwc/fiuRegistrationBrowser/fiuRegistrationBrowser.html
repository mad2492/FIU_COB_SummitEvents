<template>
    <lightning-card title="Registration Browser" icon-name="standard:people">
        <lightning-button
            slot="actions"
            label="Export to CSV"
            variant="brand-outline"
            onclick={handleExport}>
        </lightning-button>
        <div class="slds-p-around_medium toolbar">
            <lightning-input label="Search by registrant or event" value={searchKey} onchange={handleSearch}></lightning-input>
            <lightning-combobox label="Attendance" value={attendanceFilter} options={attendanceOptions} onchange={handleAttendance}></lightning-combobox>
            <lightning-combobox label="Program" value={programCode} options={programOptions} onchange={handleProgram}></lightning-combobox>
        </div>
        <template if:true={instanceScopeLabel}>
            <div class="slds-p-horizontal_medium slds-p-bottom_x-small">
                <lightning-badge label={instanceScopeLabel}></lightning-badge>
            </div>
        </template>
        <div class="slds-p-horizontal_medium slds-p-bottom_x-small note">
            Export uses FIU's `ExportCsvController` and follows its row-limit/email workflow.
        </div>
        <lightning-datatable key-field="id" data={rows} columns={columns} hide-checkbox-column></lightning-datatable>
    </lightning-card>
</template>
