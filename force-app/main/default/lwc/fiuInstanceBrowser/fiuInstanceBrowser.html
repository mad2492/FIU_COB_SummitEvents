<template>
    <c-fiu-list-shell
        page-title="Instances"
        breadcrumb-label="Home"
        current-crumb="Instances"
        icon-name="utility:date_time"
        icon-color="#04844b"
        list-title="Instances"
        total-count={totalCount}
        object-label="Instance"
        hint-text="An Instance is a specific date and time of an Event. This is what people actually register for."
        search-value={searchKey}
        columns={columns}
        rows={rows}
        visible-column-keys={visibleColumnKeys}
        selected-row-id={selectedInstanceId}
        selected-row-ids={selectedRowIds}
        sort-field={sortField1}
        sort-dir={sortDir1}
        is-loading={isLoading}
        error-message={loadError}
        page-number={pageNumber}
        page-size={pageSize}
        page-size-options={pageSizeOptions}
        active-filter-pills={activeFilterPills}
        empty-title="No instances match these filters."
        empty-body="Try adjusting your search or filters, or clear all to start over."
        quick-view-title={quickViewTitle}
        quick-view-subhead={quickViewSubhead}
        onsearch={handleSearch}
        onsortchange={handleSortChange}
        onpagechange={handlePageChange}
        onpagesizechange={handlePageSizeChange}
        onrowclick={handleRowClick}
        onrowselect={handleRowSelect}
        onrowselectall={handleRowSelectAll}
        onremovepill={handleRemovePill}
        onclearfilters={handleClearFilters}
        onopenfilters={handleOpenFilters}
        onopensettings={handleOpenSettings}
        onresetview={handleResetView}
        onquickviewclose={handleQuickViewClose}
        onclearselection={handleClearSelection}
        onbreadcrumbhome={handleBreadcrumbHome}>

        <!-- page header actions -->
        <div slot="header-actions" class="header-actions-group">
            <lightning-button-menu alternative-text="Export Options" label="Export" menu-alignment="right" onselect={handleExportMenuSelect}>
                <lightning-menu-item value="selected" label="Selected Rows"></lightning-menu-item>
                <lightning-menu-item value="filtered" label="Current Filtered View"></lightning-menu-item>
            </lightning-button-menu>
            <lightning-button label="Add Instance to existing event" variant="neutral" icon-name="utility:add" onclick={navigateToCreateInstance}></lightning-button>
        </div>

        <!-- inline filter: bucket (the most common control) -->
        <div slot="inline-filters" class="inline-bucket">
            <lightning-combobox
                variant="label-hidden"
                label="View"
                value={bucketFilter}
                options={bucketOptions}
                onchange={handleBucketChange}>
            </lightning-combobox>
        </div>

        <!-- quick-view body -->
        <div slot="quick-view-body" class="qv-body">
            <template if:true={selectedInstance}>
                <div class="qv-action-bar">
                    <lightning-button-group>
                        <lightning-button label="Open" variant="brand" onclick={openSelectedInstanceRecord}></lightning-button>
                        <lightning-button label="Clone Instance" variant="neutral" onclick={cloneSelectedInstance}></lightning-button>
                        <lightning-button label="Registrations" variant="neutral" onclick={openSelectedInstanceRegistrations}></lightning-button>
                    </lightning-button-group>
                </div>

                <div class="qv-stats">
                    <div class="qv-stat">
                        <span class="qv-stat__label">Start</span>
                        <span class="qv-stat__value">
                            <lightning-formatted-date-time
                                value={selectedInstance.startDate}
                                year="numeric" month="short" day="numeric" hour="numeric" minute="2-digit">
                            </lightning-formatted-date-time>
                        </span>
                    </div>
                    <div class="qv-stat">
                        <span class="qv-stat__label">Status</span>
                        <span class="qv-stat__value">
                            <c-fiu-datatable-pill-cell label={selectedInstance.activeStatus} theme={selectedInstance.statusTheme}></c-fiu-datatable-pill-cell>
                        </span>
                    </div>
                    <div class="qv-stat">
                        <span class="qv-stat__label">Capacity</span>
                        <span class="qv-stat__value">{selectedInstance.capacityDisplay}</span>
                    </div>
                    <div class="qv-stat">
                        <span class="qv-stat__label">Registered</span>
                        <span class="qv-stat__value">{selectedInstance.registrationCount}</span>
                    </div>
                </div>

                <template if:true={selectedInstance.registrationProgress}>
                    <div class="qv-capacity">
                        <div class="qv-capacity__label">{selectedInstance.registrationProgress.summary}</div>
                        <div class="qv-capacity__track">
                            <div class={selectedInstanceCapacityFillClass} style={selectedInstanceCapacityFillStyle}></div>
                        </div>
                    </div>
                </template>

                <template if:true={selectedInstance.registerUrl}>
                    <div class="qv-url-block">
                        <span class="qv-stat__label">Register URL</span>
                        <div class={registerUrlRowClass}>
                            <span class="qv-url-glyph" aria-hidden="true">
                                <lightning-icon icon-name="utility:link" size="xx-small" alternative-text=""></lightning-icon>
                            </span>
                            <span class="qv-url-text" title={selectedInstance.registerUrl}>{selectedInstanceRegisterUrlDisplay}</span>
                            <a class="qv-url-open" href={selectedInstance.registerUrl} target="_blank" rel="noopener noreferrer">
                                <lightning-icon icon-name="utility:new_window" size="xx-small" alternative-text=""></lightning-icon>
                                <span>Open</span>
                            </a>
                            <button class={copyButtonClass} type="button" onclick={handleCopyRegisterUrl} title="Copy registration URL">
                                <lightning-icon icon-name={copyButtonIcon} size="xx-small" alternative-text=""></lightning-icon>
                                <span>{copyButtonLabel}</span>
                            </button>
                        </div>
                    </div>
                </template>

                <template if:true={selectedInstanceIssueText}>
                    <div class="qv-callout" role="status" aria-live="polite">
                        <lightning-icon icon-name="utility:warning" size="x-small" alternative-text="Issue"></lightning-icon>
                        <span>{selectedInstanceIssueText}</span>
                    </div>
                </template>
            </template>
        </div>
    </c-fiu-list-shell>

    <!-- Filter modal: Program only (Bucket is inline) -->
    <template if:true={isFilterModalOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header"><h2 class="slds-text-heading_medium">Filters</h2></header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-combobox label="Program" value={draftProgramCode} options={programOptions} onchange={handleDraftProgram}></lightning-combobox>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeFilterModal}></lightning-button>
                    <lightning-button class="slds-m-left_small" variant="brand" label="Apply" onclick={applyFilters}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Field picker modal -->
    <template if:true={isFieldModalOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container field-modal-container">
                <header class="slds-modal__header"><h2 class="slds-text-heading_medium">Select Fields to Display</h2></header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-dual-listbox
                        class="field-picker"
                        name="instanceFieldPicker"
                        label="Visible Fields"
                        source-label="Available Fields"
                        selected-label="Visible Fields"
                        options={fieldChooserOptions}
                        value={draftVisibleColumnKeys}
                        onchange={handleFieldSelection}>
                    </lightning-dual-listbox>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeFieldModal}></lightning-button>
                    <lightning-button class="slds-m-left_small" variant="brand" label="Apply" onclick={applyFieldSelection}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
