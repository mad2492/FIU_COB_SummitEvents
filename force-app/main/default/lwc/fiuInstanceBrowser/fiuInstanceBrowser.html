<template>
    <lightning-card title="Instance Browser" icon-name="standard:events">
        <div class="slds-p-around_medium toolbar">
            <lightning-input label="Search by instance title" value={searchKey} onchange={handleSearch}></lightning-input>
            <lightning-combobox label="View" value={bucketFilter} options={bucketOptions} onchange={handleBucket}></lightning-combobox>
            <lightning-combobox label="Program" value={programCode} options={programOptions} onchange={handleProgram}></lightning-combobox>
        </div>
        <template if:true={loadError}>
            <div class="slds-p-horizontal_medium slds-p-bottom_small slds-text-color_error">{loadError}</div>
        </template>
        <template if:true={isLoading}>
            <div class="slds-p-horizontal_medium slds-p-bottom_small">
                <lightning-spinner alternative-text="Loading instances" size="small"></lightning-spinner>
            </div>
        </template>
        <lightning-datatable key-field="id" data={rows} columns={columns} hide-checkbox-column onrowaction={handleRowAction}></lightning-datatable>
    </lightning-card>
</template>
