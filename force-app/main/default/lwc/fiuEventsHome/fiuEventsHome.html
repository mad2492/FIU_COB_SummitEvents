<template>
    <div class="home-shell">
        <section class="panel command-strip">
            <div>
                <p class="eyebrow">FIU Events</p>
                <h1>Command Center</h1>
                <p class="scope-line">Scope: <strong>{selectedProgramLabel}</strong></p>
            </div>
            <div class="command-strip__actions">
                <lightning-combobox
                    class="scope-picker"
                    variant="label-hidden"
                    label="Program Scope"
                    value={programCode}
                    options={programOptions}
                    onchange={handleProgram}>
                </lightning-combobox>
                <lightning-button
                    variant="neutral"
                    label="Guide"
                    icon-name="utility:info"
                    onclick={openGuide}>
                </lightning-button>
                <lightning-button-icon
                    class="refresh-button"
                    icon-name="utility:refresh"
                    variant="border-filled"
                    alternative-text="Refresh"
                    title="Refresh"
                    disabled={isRefreshing}
                    onclick={refreshDashboard}>
                </lightning-button-icon>
            </div>
        </section>

        <template if:true={showWelcome}>
            <section class="welcome-banner">
                <div class="welcome-mark">
                    <lightning-icon icon-name="utility:lightbulb" size="small" alternative-text="Welcome"></lightning-icon>
                </div>
                <div class="welcome-copy">
                    <h2>Welcome back, {currentUserFirstName}</h2>
                    <template if:true={dashboardReady}>
                        <p>Events contain Instances; people register for Instances. Use this page to spot follow-up work and jump into the right workflow.</p>
                    </template>
                    <template if:false={dashboardReady}>
                        <p>Pulling your latest event activity...</p>
                    </template>
                </div>
                <div class="welcome-actions">
                    <button class="welcome-guide-button" onclick={openGuide} type="button">
                        <lightning-icon icon-name="utility:info" size="x-small" alternative-text="Guide"></lightning-icon>
                        <span>Read the guide</span>
                    </button>
                    <lightning-button-icon
                        icon-name="utility:close"
                        variant="bare"
                        alternative-text="Dismiss welcome"
                        title="Dismiss welcome"
                        onclick={dismissWelcome}>
                    </lightning-button-icon>
                </div>
            </section>
        </template>

        <section class="quick-actions" aria-label="Quick actions">
            <button class="quick-action quick-action--primary" data-action="create" onclick={handleGuidedAction} type="button">
                <lightning-icon icon-name="utility:add" size="x-small" alternative-text=""></lightning-icon>
                <span>New Event</span>
            </button>
            <button class="quick-action" data-action="instance" onclick={handleGuidedAction} type="button">
                <lightning-icon icon-name="utility:event" size="x-small" alternative-text=""></lightning-icon>
                <span>New Instance</span>
            </button>
            <button class="quick-action" data-action="clone" onclick={handleGuidedAction} type="button">
                <lightning-icon icon-name="utility:copy" size="x-small" alternative-text=""></lightning-icon>
                <span>Clone Event</span>
            </button>
            <button class="quick-action" data-action="bulk" onclick={handleGuidedAction} type="button">
                <lightning-icon icon-name="utility:people" size="x-small" alternative-text=""></lightning-icon>
                <span>Bulk Update Regs</span>
            </button>
        </section>

        <template if:true={isFirstRun}>
            <section class="panel first-run">
                <div class="first-run__copy">
                    <p class="eyebrow">First setup</p>
                    <h2>Let's set up your first event</h2>
                    <p>Start with a parent Event, then add the first dated Instance that people can register for.</p>
                </div>
                <div class="first-run__actions">
                    <lightning-button
                        variant="brand"
                        label="Create my first event"
                        icon-name="utility:add"
                        onclick={openCreateWizard}>
                    </lightning-button>
                    <lightning-button
                        variant="neutral"
                        label="Read the guide first"
                        onclick={openGuide}>
                    </lightning-button>
                </div>
                <div class="model-row" aria-label="FIU Events model">
                    <div class="model-step">
                        <strong>Event</strong>
                        <span>Parent setup, branding, and routing</span>
                    </div>
                    <div class="model-step">
                        <strong>Instance</strong>
                        <span>A date and time people register for</span>
                    </div>
                    <div class="model-step">
                        <strong>Registration</strong>
                        <span>The person and their RSVP details</span>
                    </div>
                </div>
            </section>
        </template>

        <template if:true={showOperationalDashboard}>
            <div class="workspace-layout">
                <section class="panel attention-panel">
                    <div class="panel-head">
                        <div class="panel-head__title">
                            <lightning-icon icon-name="utility:warning" size="small" alternative-text="Readiness issues"></lightning-icon>
                            <h2>Readiness Issues</h2>
                            <span class="panel-count">{attentionCount}</span>
                        </div>
                    </div>
                    <template if:true={hasAttentionRows}>
                        <ul class="panel-list">
                            <template for:each={attentionRows} for:item="row">
                                <li key={row.rowKey} class="attention-row">
                                    <div class="attention-row__copy">
                                        <p class="attention-row__title">{row.instanceTitle}<span> &middot; {row.eventName}</span></p>
                                        <p class="attention-row__meta">{row.reason}</p>
                                    </div>
                                    <lightning-button
                                        label="Fix"
                                        data-event-id={row.eventId}
                                        data-instance-id={row.instanceId}
                                        onclick={openAttentionFix}>
                                    </lightning-button>
                                </li>
                            </template>
                        </ul>
                    </template>
                    <template if:false={hasAttentionRows}>
                        <p class="panel-empty">No event or instance readiness issues detected.</p>
                    </template>
                </section>

                <section class="panel">
                    <div class="panel-head">
                        <div class="panel-head__title">
                            <lightning-icon icon-name="utility:date_time" size="small" alternative-text="Upcoming"></lightning-icon>
                            <h2>Upcoming This Week</h2>
                            <span class="panel-count">{upcomingCount}</span>
                        </div>
                        <lightning-button variant="base" label="View instances" onclick={openInstances}></lightning-button>
                    </div>
                    <template if:true={hasUpcomingRows}>
                        <ul class="panel-list">
                            <template for:each={upcomingRows} for:item="row">
                                <li key={row.instanceId} class="upcoming-row">
                                    <p class="upcoming-row__title">{row.instanceTitle}<span> &middot; {row.eventName}</span></p>
                                    <p class="upcoming-row__meta">
                                        <lightning-formatted-date-time value={row.startDate}></lightning-formatted-date-time>
                                        <span> &middot; {row.status}</span>
                                    </p>
                                </li>
                            </template>
                        </ul>
                    </template>
                    <template if:false={hasUpcomingRows}>
                        <p class="panel-empty">No upcoming instances found.</p>
                    </template>
                </section>
            </div>

            <section class="kpi-strip" aria-label="Dashboard reference metrics">
                <button class="kpi-tile" data-action="events" onclick={handleKpiClick} type="button">
                    <span class="kpi-tile__label">Active Events</span>
                    <span class="kpi-tile__value">{kpiActiveEvents}</span>
                    <span class="kpi-tile__hint">Browse events</span>
                </button>
                <button class="kpi-tile" data-action="instances" onclick={handleKpiClick} type="button">
                    <span class="kpi-tile__label">Upcoming Instances</span>
                    <span class="kpi-tile__value">{kpiUpcoming}</span>
                    <span class="kpi-tile__hint">View instances</span>
                </button>
                <button class={registrationFollowUpClass} data-action="registrationFollowUp" onclick={handleKpiClick} type="button">
                    <span class="kpi-tile__label">Registration Follow-Up</span>
                    <span class="kpi-tile__value">{kpiStartedRegs}</span>
                    <span class="kpi-tile__hint">{registrationFollowUpHint}</span>
                </button>
                <button class={readinessKpiClass} data-action="readinessIssues" onclick={handleKpiClick} type="button">
                    <span class="kpi-tile__label">Readiness Issues</span>
                    <span class="kpi-tile__value">{attentionCount}</span>
                    <span class="kpi-tile__hint">{readinessKpiHint}</span>
                </button>
            </section>
        </template>
    </div>
</template>
