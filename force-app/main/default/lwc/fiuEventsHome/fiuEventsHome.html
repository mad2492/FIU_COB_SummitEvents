<template>
    <div class="home-shell">
        <section class="page-header">
            <div class="page-header__title">
                <h1>{greetingTitle}</h1>
                <p class="page-header__subtitle">
                    <span>{greetingSubtitle}</span>
                    <span class="scope-chip" title="Program scope">
                        <lightning-icon icon-name="utility:filterList" size="xx-small" alternative-text="Scope"></lightning-icon>
                        <span>{scopeChipLabel}</span>
                    </span>
                </p>
            </div>
            <div class="page-header__actions">
                <lightning-combobox
                    class="scope-picker"
                    variant="label-hidden"
                    label="Program Scope"
                    value={programCode}
                    options={programOptions}
                    onchange={handleProgram}>
                </lightning-combobox>
                <lightning-button
                    variant="neutral"
                    label="Guide"
                    icon-name="utility:info"
                    onclick={openGuide}>
                </lightning-button>
            </div>
        </section>

        <template if:true={showSkeleton}>
            <section class="kpi-strip" aria-hidden="true">
                <div class="kpi-tile kpi-tile--skeleton"><span class="sk sk--label"></span><span class="sk sk--value"></span><span class="sk sk--hint"></span></div>
                <div class="kpi-tile kpi-tile--skeleton"><span class="sk sk--label"></span><span class="sk sk--value"></span><span class="sk sk--hint"></span></div>
                <div class="kpi-tile kpi-tile--skeleton"><span class="sk sk--label"></span><span class="sk sk--value"></span><span class="sk sk--hint"></span></div>
                <div class="kpi-tile kpi-tile--skeleton"><span class="sk sk--label"></span><span class="sk sk--value"></span><span class="sk sk--hint"></span></div>
            </section>
            <div class="workspace-layout">
                <section class="panel panel--skeleton"><div class="sk sk--head"></div><div class="sk sk--row"></div><div class="sk sk--row"></div><div class="sk sk--row"></div></section>
                <section class="panel panel--skeleton"><div class="sk sk--head"></div><div class="sk sk--row"></div><div class="sk sk--row"></div><div class="sk sk--row"></div></section>
            </div>
        </template>

        <template if:true={isFirstRun}>
            <section class="panel first-run">
                <div class="first-run__copy">
                    <p class="eyebrow">First setup</p>
                    <h2>Let's set up your first event</h2>
                    <p>Start with a parent Event, then add the first dated Instance that people can register for.</p>
                </div>
                <div class="first-run__actions">
                    <lightning-button
                        variant="brand"
                        label="Create my first event"
                        icon-name="utility:add"
                        onclick={openCreateWizard}>
                    </lightning-button>
                    <lightning-button
                        variant="neutral"
                        label="Read the guide first"
                        onclick={openGuide}>
                    </lightning-button>
                </div>
                <div class="model-row" aria-label="FIU Events model">
                    <div class="model-step">
                        <strong>Event</strong>
                        <span>Parent setup, branding, and routing</span>
                    </div>
                    <div class="model-step">
                        <strong>Instance</strong>
                        <span>A date and time people register for</span>
                    </div>
                    <div class="model-step">
                        <strong>Registration</strong>
                        <span>The person and their RSVP details</span>
                    </div>
                </div>
            </section>
        </template>

        <template if:true={showOperationalDashboard}>
            <section class="kpi-strip" aria-label="Key metrics">
                <button class={upcomingKpiClass} data-action="upcoming" onclick={handleKpiClick} type="button"
                    aria-label="Upcoming instances, view calendar">
                    <span class="kpi-tile__label">Upcoming</span>
                    <span class="kpi-tile__value">{kpiUpcoming}</span>
                    <span class="kpi-tile__hint">{upcomingKpiHint}</span>
                </button>
                <button class={openRegsKpiClass} data-action="openRegs" onclick={handleKpiClick} type="button"
                    aria-label="Expected attendees, view registrants">
                    <span class="kpi-tile__label">Expected Attendees</span>
                    <span class="kpi-tile__value">{kpiOpenRegs}</span>
                    <span class="kpi-tile__hint">{openRegsKpiHint}</span>
                </button>
                <button class={followUpKpiClass} data-action="followUp" onclick={handleKpiClick} type="button"
                    aria-label="Follow-up needed, view started registrations">
                    <span class="kpi-tile__label">Follow-Up Needed</span>
                    <span class="kpi-tile__value">{kpiStartedRegs}</span>
                    <span class="kpi-tile__hint">{followUpKpiHint}</span>
                </button>
                <button class={attentionKpiClass} data-action="attention" onclick={handleKpiClick} type="button"
                    aria-label="Needs attention, review readiness issues">
                    <span class="kpi-tile__label">Needs Attention</span>
                    <span class="kpi-tile__value">{attentionCount}</span>
                    <span class="kpi-tile__hint">{attentionKpiHint}</span>
                </button>
            </section>

            <div class="workspace-layout">
                <section class="panel attention-panel">
                    <div class="panel-head">
                        <div class="panel-head__title">
                            <h2>Needs Attention</h2>
                            <span class="panel-count">{attentionCount}</span>
                        </div>
                        <p class="panel-head__subtitle">{attentionPanelSubtitle}</p>
                    </div>
                    <template if:true={hasAttentionRows}>
                        <ul class="panel-list">
                            <template for:each={attentionRows} for:item="row">
                                <li key={row.rowKey} class="attention-row">
                                    <div class="attention-row__copy">
                                        <p class="row-title">{row.instanceTitle}<span class="row-title__meta"> · {row.eventName}</span></p>
                                        <p class="row-reason">{row.reason}</p>
                                    </div>
                                    <button class="row-action"
                                        type="button"
                                        data-event-id={row.eventId}
                                        data-instance-id={row.instanceId}
                                        onclick={openAttentionFix}>
                                        Review
                                        <lightning-icon icon-name="utility:chevronright" size="xx-small" alternative-text=""></lightning-icon>
                                    </button>
                                </li>
                            </template>
                        </ul>
                        <template if:true={hasAttentionOverflow}>
                            <button class="panel-footer-link" type="button" onclick={openNotReadyEvents}>
                                {attentionOverflowLabel}
                            </button>
                        </template>
                    </template>
                    <template if:false={hasAttentionRows}>
                        <div class="panel-empty panel-empty--good">
                            <lightning-icon icon-name="utility:success" size="small" alternative-text=""></lightning-icon>
                            <div>
                                <strong>Everything's in order.</strong>
                                <p>No readiness issues across your active events.</p>
                            </div>
                        </div>
                    </template>
                </section>

                <section class="panel upcoming-panel">
                    <div class="panel-head">
                        <div class="panel-head__title">
                            <h2>Upcoming</h2>
                            <span class="panel-count">{kpiUpcoming}</span>
                        </div>
                        <p class="panel-head__subtitle">{upcomingPanelSubtitle}</p>
                    </div>
                    <template if:true={hasUpcomingRows}>
                        <ul class="panel-list">
                            <template for:each={upcomingRows} for:item="row">
                                <li key={row.instanceId}>
                                    <button class="upcoming-row" type="button" data-instance-id={row.instanceId} onclick={openUpcomingRow}>
                                        <div class="upcoming-row__copy">
                                            <p class="row-title">{row.instanceTitle}<span class="row-title__meta"> · {row.eventName}</span></p>
                                            <p class="row-meta">
                                                <lightning-formatted-date-time value={row.startDate}></lightning-formatted-date-time>
                                                <span> · {row.status}</span>
                                            </p>
                                        </div>
                                        <lightning-icon icon-name="utility:chevronright" size="xx-small" alternative-text=""></lightning-icon>
                                    </button>
                                </li>
                            </template>
                        </ul>
                        <template if:true={hasUpcomingOverflow}>
                            <button class="panel-footer-link" type="button" onclick={openInstances}>
                                {upcomingOverflowLabel}
                            </button>
                        </template>
                    </template>
                    <template if:false={hasUpcomingRows}>
                        <div class="panel-empty">
                            <lightning-icon icon-name="utility:date_time" size="small" alternative-text=""></lightning-icon>
                            <div>
                                <strong>Nothing on the calendar.</strong>
                                <p>Add an instance to publish the next date and time people can register for.</p>
                            </div>
                        </div>
                    </template>
                </section>
            </div>

            <section class="quick-actions-section" aria-label="Quick actions">
                <h2 class="quick-actions-heading">Start something new</h2>
                <div class="quick-actions">
                    <button class="quick-action quick-action--primary" data-action="instance" onclick={handleGuidedAction} type="button">
                        <span class="quick-action__icon">
                            <lightning-icon icon-name="utility:event" size="small" alternative-text=""></lightning-icon>
                        </span>
                        <span class="quick-action__copy">
                            <strong>Add Instance</strong>
                            <span>A new date and time on an existing event</span>
                        </span>
                    </button>
                    <button class="quick-action" data-action="manage" onclick={handleGuidedAction} type="button">
                        <span class="quick-action__icon">
                            <lightning-icon icon-name="utility:people" size="small" alternative-text=""></lightning-icon>
                        </span>
                        <span class="quick-action__copy">
                            <strong>Manage Registrations</strong>
                            <span>Update attendance and other bulk actions</span>
                        </span>
                    </button>
                    <button class="quick-action" data-action="create" onclick={handleGuidedAction} type="button">
                        <span class="quick-action__icon">
                            <lightning-icon icon-name="utility:add" size="small" alternative-text=""></lightning-icon>
                        </span>
                        <span class="quick-action__copy">
                            <strong>New Event</strong>
                            <span>Set up a new parent event from scratch</span>
                        </span>
                    </button>
                    <button class="quick-action" data-action="clone" onclick={handleGuidedAction} type="button">
                        <span class="quick-action__icon">
                            <lightning-icon icon-name="utility:copy" size="small" alternative-text=""></lightning-icon>
                        </span>
                        <span class="quick-action__copy">
                            <strong>Clone Event</strong>
                            <span>Copy a previous event as a starting point</span>
                        </span>
                    </button>
                </div>
            </section>
        </template>
    </div>
</template>
